const TAG_COLORS = {"Design": "#c8a45c", "Next.js": "#4e7ec8", "Subway": "#c85858", "Firebase": "#e8943a", "PDCA": "#4eaa78", "Feature": "#9878c8", "OG Image": "#c8906e", "Sitemap": "#5abcbc", "Auth": "#b8c84e", "Deploy": "#6e9ec8", "Onboarding": "#c878a0", "Env": "#7888c8", "General": "#888888", "oneulgam": "#e8d5a3"};

const TAGS_ORDER = ["Design", "Next.js", "Subway", "Firebase", "PDCA", "Feature", "OG Image", "Sitemap", "Auth", "Deploy", "Onboarding", "Env", "General", "oneulgam"];

// ── Build edges (nodes sharing ≥2 tags) ──────────────────
function buildEdges(nodes) {
  const edges = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i].tags, b = nodes[j].tags;
      const shared = a.filter(t => b.includes(t));
      if (shared.length >= 2) {
        edges.push({ source: i, target: j, weight: shared.length });
      }
    }
  }
  return edges;
}

// ── Canvas + sim ──────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, vmin;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  vmin = Math.min(W, H) / 100;
}
resize();
window.addEventListener('resize', () => { resize(); initPositions(); });

// Simulation state
const sim = NODES.map((n, i) => ({
  ...n,
  x: W * 0.3 + (Math.random() - 0.5) * W * 0.5,
  y: H * 0.5 + (Math.random() - 0.5) * H * 0.5,
  vx: 0, vy: 0,
  r: 5 + n.facts.length * 1.5,
  color: TAG_COLORS[n.tags[0]] || '#888',
}));

function initPositions() {
  // Cluster by primary tag in a grid
  const tagPos = {};
  const tags = TAGS_ORDER;
  const cols = 4;
  tags.forEach((t, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    tagPos[t] = {
      x: W * (0.15 + col * 0.2),
      y: H * (0.2  + row * 0.25),
    };
  });
  sim.forEach(n => {
    const home = tagPos[n.tags[0]];
    if (home) {
      n.x = home.x + (Math.random() - 0.5) * 60;
      n.y = home.y + (Math.random() - 0.5) * 60;
    }
    n.vx = 0; n.vy = 0;
  });
}
initPositions();

const EDGES = buildEdges(NODES);

// ── Force sim tick ────────────────────────────────────────
const TAG_CENTERS = {};
function computeTagCenters() {
  const tags = TAGS_ORDER;
  const cols = 4;
  tags.forEach((t, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    TAG_CENTERS[t] = {
      x: W * (0.15 + col * 0.2),
      y: H * (0.2  + row * 0.25),
    };
  });
}
computeTagCenters();
window.addEventListener('resize', computeTagCenters);

function tick() {
  const K_REPEL     = 800;
  const K_EDGE      = 0.012;
  const K_CLUSTER   = 0.018;
  const K_CENTER    = 0.004;
  const DAMPING     = 0.82;
  const EDGE_LEN    = 90;

  // Reset forces
  sim.forEach(n => { n.fx = 0; n.fy = 0; });

  // Node repulsion
  for (let i = 0; i < sim.length; i++) {
    for (let j = i + 1; j < sim.length; j++) {
      const dx = sim[i].x - sim[j].x;
      const dy = sim[i].y - sim[j].y;
      const d2 = dx*dx + dy*dy + 1;
      const d  = Math.sqrt(d2);
      const minD = sim[i].r + sim[j].r + 10;
      const f = K_REPEL / (d2);
      const fx = (dx/d) * f;
      const fy = (dy/d) * f;
      sim[i].fx += fx; sim[i].fy += fy;
      sim[j].fx -= fx; sim[j].fy -= fy;
    }
  }

  // Edge attraction
  EDGES.forEach(e => {
    const a = sim[e.source], b = sim[e.target];
    const dx = b.x - a.x, dy = b.y - a.y;
    const d  = Math.sqrt(dx*dx + dy*dy) || 1;
    const f  = (d - EDGE_LEN) * K_EDGE * e.weight;
    a.fx += (dx/d) * f;
    a.fy += (dy/d) * f;
    b.fx -= (dx/d) * f;
    b.fy -= (dy/d) * f;
  });

  // Cluster pull toward tag center
  sim.forEach(n => {
    const c = TAG_CENTERS[n.tags[0]];
    if (c) {
      n.fx += (c.x - n.x) * K_CLUSTER;
      n.fy += (c.y - n.y) * K_CLUSTER;
    }
    // Gravity to canvas center
    n.fx += (W/2 - n.x) * K_CENTER;
    n.fy += (H/2 - n.y) * K_CENTER;
  });

  // Integrate
  sim.forEach(n => {
    if (n.pinned) return;
    n.vx = (n.vx + n.fx) * DAMPING;
    n.vy = (n.vy + n.fy) * DAMPING;
    n.x += n.vx;
    n.y += n.vy;
    // Boundary
    const pad = n.r + 8;
    n.x = Math.max(pad, Math.min(W - pad, n.x));
    n.y = Math.max(pad, Math.min(H - pad, n.y));
  });
}

// ── Draw ──────────────────────────────────────────────────
let hoveredNode = null;
let selectedNode = null;
let t = 0;

function draw() {
  // Trail bg
  ctx.fillStyle = 'rgba(10,10,12,0.22)';
  ctx.fillRect(0, 0, W, H);

  // Edges
  EDGES.forEach(e => {
    const a = sim[e.source], b = sim[e.target];
    const isHovered = hoveredNode && (e.source === hoveredNode._i || e.target === hoveredNode._i);
    const isSelected = selectedNode && (e.source === selectedNode._i || e.target === selectedNode._i);
    const alpha = isSelected ? 0.35 : isHovered ? 0.22 : 0.04;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(200,164,92,${alpha})`;
    ctx.lineWidth = isSelected || isHovered ? 1 : 0.5;
    ctx.stroke();
  });

  // Tag cluster labels (faint)
  ctx.font = `300 ${vmin * 1.0}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  Object.entries(TAG_CENTERS).forEach(([tag, pos]) => {
    const col = TAG_COLORS[tag] || '#888';
    ctx.fillStyle = col + '18';
    ctx.fillText(tag, pos.x, pos.y - vmin * 5);
  });

  // Nodes
  sim.forEach(n => {
    const isHov  = hoveredNode  === n;
    const isSel  = selectedNode === n;
    const r      = n.r * (isSel ? 1.4 : isHov ? 1.2 : 1.0);
    const energy = isSel || isHov;

    if (energy) {
      ctx.shadowColor = n.color;
      ctx.shadowBlur  = isSel ? 20 : 12;
    }

    // Fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isSel ? n.color : isHov ? n.color + 'cc' : n.color + '66';
    ctx.fill();

    // Border ring
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = n.color + (isSel ? 'ff' : 'aa');
    ctx.lineWidth   = isSel ? 1.5 : 0.8;
    ctx.stroke();

    ctx.shadowBlur = 0;
  });

  t += 0.016;
}

// ── Render loop ───────────────────────────────────────────
let warmup = 0;
function loop() {
  if (warmup < 120) { tick(); warmup++; }
  else if (warmup < 300) { tick(); warmup++; } // keep ticking slower
  tick();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── Interaction ───────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function hitTest(mx, my) {
  let closest = null, best = Infinity;
  sim.forEach(n => {
    const d = Math.hypot(n.x - mx, n.y - my);
    if (d < n.r + 6 && d < best) { best = d; closest = n; }
  });
  return closest;
}

canvas.addEventListener('mousemove', e => {
  const n = hitTest(e.clientX, e.clientY);
  hoveredNode = n;
  canvas.style.cursor = n ? 'pointer' : 'default';
  if (n) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.textContent = n.title;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tooltip.style.display = 'none';
});

canvas.addEventListener('click', e => {
  const n = hitTest(e.clientX, e.clientY);
  if (n) openPanel(n);
  else if (!document.getElementById('panel').contains(e.target)) closePanel();
});

// ── Panel ─────────────────────────────────────────────────
const panel    = document.getElementById('panel');
const panelTag = document.getElementById('panel-tag');
const panelTitle  = document.getElementById('panel-title');
const panelSub    = document.getElementById('panel-subtitle');
const panelBody   = document.getElementById('panel-body');
let typewriterTimer = null;

function typewrite(el, text, speed, onDone) {
  let i = 0;
  el.textContent = '';
  function step() {
    if (i <= text.length) {
      el.textContent = text.slice(0, i);
      i++;
      typewriterTimer = setTimeout(step, speed);
    } else if (onDone) {
      onDone();
    }
  }
  step();
}

function parseFact(text) {
  // Convert `code` to <code> spans
  const parts = text.split(/`([^`]+)`/);
  const span = document.createElement('span');
  span.className = 'fact-text';
  parts.forEach((p, i) => {
    if (i % 2 === 1) {
      const c = document.createElement('code');
      c.textContent = p;
      span.appendChild(c);
    } else if (p) {
      span.appendChild(document.createTextNode(p));
    }
  });
  return span;
}

function openPanel(n) {
  selectedNode = n;
  clearTimeout(typewriterTimer);
  panelBody.innerHTML = '';

  const color = TAG_COLORS[n.tags[0]] || '#888';
  panelTag.textContent = n.tags[0].toUpperCase();
  panelTag.style.background = color + '22';
  panelTag.style.color = color;
  panelTag.style.borderColor = color + '44';

  panelTitle.textContent = '';
  panelSub.textContent = '';

  panel.classList.add('open');

  // Typewrite title → subtitle → facts
  typewrite(panelTitle, n.title, 18, () => {
    typewrite(panelSub, n.subtitle || '', 12, () => {
      showFacts(n.facts, color, 0);
    });
  });
}

function showFacts(facts, color, idx) {
  if (idx >= facts.length) return;
  const item = document.createElement('div');
  item.className = 'fact-item';

  const dot = document.createElement('div');
  dot.className = 'fact-dot';
  dot.style.background = color;

  item.appendChild(dot);
  item.appendChild(parseFact(facts[idx]));
  panelBody.appendChild(item);

  requestAnimationFrame(() => {
    item.classList.add('visible');
    typewriterTimer = setTimeout(() => showFacts(facts, color, idx + 1), 220);
  });
}

function closePanel() {
  panel.classList.remove('open');
  clearTimeout(typewriterTimer);
  selectedNode = null;
}

document.getElementById('close-btn').addEventListener('click', closePanel);

// ── Legend ────────────────────────────────────────────────
const legend = document.getElementById('legend');
Object.entries(TAG_COLORS).forEach(([tag, color]) => {
  const row = document.createElement('div');
  row.className = 'legend-row';
  const dot = document.createElement('div');
  dot.className = 'legend-dot';
  dot.style.background = color;
  const lbl = document.createElement('span');
  lbl.textContent = tag;
  row.append(dot, lbl);
  legend.appendChild(row);
});
</script>
